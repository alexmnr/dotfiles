# --- General settings ---
# Color
set -g default-terminal "screen-256color"
# Buffer
set -g history-limit 20000
set -g buffer-limit 20
# Timing
set -sg escape-time 0
set -g display-time 1500
set -g repeat-time 300
# Other Features
set -g remain-on-exit off
setw -g allow-rename off
setw -g automatic-rename off
setw -g aggressive-resize on
# Set parent terminal title to reflect current window in tmux session 
set -g set-titles on
set -g set-titles-string "#I:#W"
# Start index of window/pane with 1, because we're humans, not computers
set -g base-index 1
setw -g pane-base-index 1
# Enable mouse support
set -g mouse on

# --- Key Bindings ---
# Prefix 
unbind C-Space
set -g prefix C-Space
# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"
# Window Navigation
bind -n C-w next-window
bind -n C-b previous-window
bind -r ">" swap-window -d -t +1
bind -r "<" swap-window -d -t -1
# Window Creation
bind -n C-t new-window
bind-key -n C-S-t command-prompt -p "window name:" "new-window; rename-window '%%'"
# Rename session and window
bind c command-prompt -p "window name:" "rename-window '%%'"
bind C command-prompt -p "session name:" "rename-session '%%'"
# Pane Managment
bind-key / split -h
bind-key = split -v
bind -n C-j select-pane -D 
bind -n C-k select-pane -U 
bind -n C-h select-pane -L 
bind -n C-l select-pane -R 
bind -n C-a resize-pane -Z 
bind -n C-o swap-pane -D
# Kill pane/window/session shortcuts
bind x kill-pane
bind X confirm-before -p "kill-session #S? (y/n)" kill-session
# Detach from session
bind d detach

# --- Copy Mode and Clipboard ---
# Copy Mode
bind -n C-S-v paste-buffer
# bind -n C-v choose-buffer
bind -n C-p choose-buffer
set-window-option -g mode-keys vi
bind-key v copy-mode
bind -T copy-mode-vi C-k send-keys -X halfpage-up
bind -T copy-mode-vi C-j send-keys -X halfpage-down
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi escape send -X cancel 
# Clipboard
set -s set-clipboard on
set -g allow-passthrough
set -g @copy_use_osc52_fallback on

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-power'
set -g @plugin 'tmux-plugins/tmux-yank'

# --- Theme ---
set -g @tmux_power_date_format '%D'
set -g @tmux_power_time_format '%T'
set-option -g status-left "Session #S (#{window_index} windows) "
set -g @tmux_power_g0 "#000000"
set -g @color_active   '#ed3b77'
set -g @color_inactive   '#666666'
run-shell "tmux set -g @tmux_power_theme $(tmux show-option -gv @color_active)"

# --- Nesting local and remote sessions ---
# Session is considered to be remote when we ssh into host
if-shell 'test -n "$SSH_CLIENT"' \
    'source-file ~/.tmux.remote.conf'

# Also, change some visual styles when window keys are off
bind -T root C-q  \
    set prefix None \;\
    set key-table off \;\
    run-shell "tmux set -g @tmux_power_theme $(tmux show-option -gv @color_inactive)" \;\
    run-shell '~/.tmux/plugins/tmux-power/tmux-power.tmux' \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    send-keys M-F11 \;\
    refresh-client -S \;\

bind -T off C-q \
  set -u prefix \;\
  set -u key-table \;\
  run-shell "tmux set -g @tmux_power_theme $(tmux show-option -gv @color_active)" \;\
  run-shell '~/.tmux/plugins/tmux-power/tmux-power.tmux' \;\
  send-keys M-F12 \;\
  refresh-client -S

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
